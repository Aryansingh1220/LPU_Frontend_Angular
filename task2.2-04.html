<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Paragraph Styling</title>
</head>

<body>

  <h2>Paragraph Example</h2>

  <p class="highlight" style="color: blue; font-weight: bold;">
    This is a highlighted paragraph using class.
  </p>

  <p class="note" style="background-color: lightyellow; padding: 10px;">
    This paragraph has a note style.
  </p>

  <p id="important" style="color: red; font-size: 20px;">
    This is an important paragraph using ID.
  </p>


  <p id="editable" contenteditable="true" style="border: 2px solid black; padding: 10px;">
    You can edit this paragraph directly in the browser.
  </p>

  <p>
    This is a normal paragraph without any styling.
  </p>

</body>

</html>
